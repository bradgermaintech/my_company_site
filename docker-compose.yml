services:
  db:
    image: postgres:16-alpine
    container_name: alignops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: alignops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Greatpower
    ports:
      - "5432:5432"
    volumes:
      - alignops_postgres_data:/var/lib/postgresql/data

volumes:
  alignops_postgres_data:
