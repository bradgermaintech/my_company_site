services:
  db:
    image: postgres:16-alpine
    container_name: pipelineos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pipelineos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pipelineos_postgres_data:/var/lib/postgresql/data

volumes:
  pipelineos_postgres_data:
